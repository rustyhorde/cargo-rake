[workspace]
resolver = "3"

members = ["librake", "cargo-rake", "rake"]

[workspace.dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
indexmap = { version = "2.14.0", features = ["serde"] }
librake = { version = "0.1.0", path = "librake" }
rustversion = "1.0.22"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
toml = { version = "1.1.2", features = ["preserve_order"] }
vergen-gix = { version = "10.0.0", features = [
    "build",
    "cargo",
    "rustc",
    "si",
] }
