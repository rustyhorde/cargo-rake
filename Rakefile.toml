# =============================================================================
# Rakefile.toml — example / reference
#
# A Rakefile declares named *targets*. Each target owns an ordered array of
# named *commands* and may depend on other targets and on external *tools*.
# Every option is shown below with its default; commented lines mark optional
# keys and their defaults.
#
#   toolchain = "stable"   # OPTIONAL, default: unset. The Rust toolchain this
#                          # project targets. When set, both `rake` and `cargo
#                          # rake` verify/install the channel (via rustup) and
#                          # pin the run to it. Accepts "stable"/"beta"/"nightly"
#                          # or any rustup toolchain (e.g. "1.95.0",
#                          # "nightly-2024-01-01"). Omitted here so this repo's
#                          # runs use the active toolchain.
#
#   [tool.<name>]          # OPTIONAL table of external tools (cargo subcommands,
#                          # etc.) that targets can reference by name.
#     crate        = "..." # crates.io name; required when update = true.
#     check        = [...] # REQUIRED. Presence probe; zero exit = installed.
#                          # For a cargo subcommand use ["cargo", "<sub>",
#                          # "--version"] (the bare cargo-<sub> rejects it).
#     install      = [...] # REQUIRED. Run when the tool is missing/out of date.
#     update       = false # default. When true, compare the installed version
#                          # against semver_check and reinstall if newer.
#     semver_check = "crates-io"  # default (and only mode today).
#
#   [target.<name>]
#     depends_on = []      # default. Targets to run first, in order.
#     tools      = []      # default. Tool names (from [tool.*]) to ensure first.
#
#   [[target.<name>.command]]
#     name          = "..."   # REQUIRED. Label shown in --list and errors;
#                             # unique within the target.
#     cmd           = [...]   # REQUIRED, non-empty. Program + args, spawned
#                             # directly — no shell.
#     skip_on_error = false   # default. When true, a non-zero exit is tolerated
#                             # and the target continues instead of aborting.
# =============================================================================
# toolchain = "stable"

[tool.matrix]
crate = "cargo-matrix"
check = ["cargo", "matrix", "--version"]
install = ["cargo", "install", "cargo-matrix", "--force", "--locked"]
update = true                     # default: false
# semver_check = "crates-io"      # default (and only mode today)

[tool.nextest]
crate = "cargo-nextest"
check = ["cargo", "nextest", "--version"]
install = ["cargo", "install", "cargo-nextest", "--force", "--locked"]
update = true

[tool.llvm-cov]
crate = "cargo-llvm-cov"
check = ["cargo", "llvm-cov", "--version"]
install = ["cargo", "install", "cargo-llvm-cov", "--force", "--locked"]
update = true

[[target.pull.command]]
name = "pull"
cmd = ["git", "pull"]
# skip_on_error = false           # default: a non-zero exit aborts the target

[[target.update.command]]
name = "update"
cmd = ["cargo", "update"]

[[target.fmt.command]]
name = "fmt"
cmd = ["cargo", "fmt"]

[[target.fmt.command]]
name = "fmt check"
cmd = ["cargo", "fmt", "--all", "--", "--check"]

[target.clippy]
tools = ["matrix"]

[[target.clippy.command]]
name = "clippy"
cmd = ["cargo", "matrix", "clippy", "--all-targets", "--", "-Dwarnings"]

[target.build]
tools = ["matrix"]
[[target.build.command]]
name = "build"
cmd = ["cargo", "matrix", "build"]

[target.test]
tools = ["matrix", "nextest"]
depends_on = ["build"]
[[target.test.command]]
name = "test"
cmd = ["cargo", "matrix", "nextest", "run"]

[[target.doc_test.command]]
name = "doc test"
cmd = ["cargo", "matrix", "test", "--doc", "-p", "librake"]

[target.coverage]
tools = ["llvm-cov", "matrix", "nextest"]
depends_on = ["test"]
[[target.coverage.command]]
name = "coverage"
cmd = ["cargo", "matrix", "-F", "unstable", "llvm-cov", "nextest", "--no-report"]

[[target.coverage.command]]
name = "lcov.info"
cmd = ["cargo", "llvm-cov", "report", "--lcov", "--output-path", "lcov.info"]

[[target.coverage.command]]
name = "html"
cmd = ["cargo", "llvm-cov", "report", "--html"]

[target.install]
depends_on = ["build"]
[[target.install.command]]
name = "install"
cmd = ["cargo", "install", "--path", "cargo-rake", "--force", "--locked"]

[[target.clean.command]]
name = "clean"
cmd = ["cargo", "clean"]

[[target.clean.command]]
name = "rm lcov.info"
cmd = ["rm", "lcov.info"]

[target.puc]
depends_on = ["pull", "clean", "update"]

[target.most]
depends_on = ["fmt", "clippy", "build", "test", "coverage"]

[target.all]
depends_on = ["fmt", "clippy", "build", "test", "coverage", "install", "clean"]

[target.default]
depends_on = ["most"]
