# =============================================================================
# Rakefile.toml — example / reference
#
# A Rakefile declares named *targets*. Each target owns an ordered array of
# named *commands* and may depend on other targets and on external *tools*.
# Every option is shown below with its default; commented lines mark optional
# keys and their defaults.
#
#   toolchain = "stable"   # OPTIONAL, default: unset. The Rust toolchain this
#                          # project targets. When set, both `rake` and `cargo
#                          # rake` verify/install the channel (via rustup) and
#                          # pin the run to it. Accepts "stable"/"beta"/"nightly"
#                          # or any rustup toolchain (e.g. "1.95.0",
#                          # "nightly-2024-01-01"). Omitted here so this repo's
#                          # runs use the active toolchain.
#
#   [lifecycle]            # OPTIONAL table. Enables before/after lifecycle
#                          # events (see librake::lifecycle) when the run is
#                          # also licensed for the `events` feature; absent is
#                          # a quiet no-op.
#     address = "..."      # REQUIRED (within the table). A `host:port` UDP
#                          # socket address events are sent to, fire-and-forget
#                          # (nobody needing to listen is fine). Also accepts
#                          # an array of addresses (e.g. ["127.0.0.1:9999",
#                          # "10.0.0.127:9999"]) to send every event to more
#                          # than one destination at once.
#
#   [tool.cargo.<name>]    # OPTIONAL table of cargo-installable tools (cargo
#                          # subcommands, etc.) that targets reference by name.
#     crate        = "..." # crates.io name; required when update = true.
#     check        = [...] # REQUIRED. Presence probe; zero exit = installed.
#                          # For a cargo subcommand use ["cargo", "<sub>",
#                          # "--version"] (the bare cargo-<sub> rejects it).
#     install      = [...] # REQUIRED. Run when the tool is missing/out of date.
#     update       = false # default. When true, compare the installed version
#                          # against semver_check and reinstall if newer.
#     semver_check = "crates-io"  # default (and only mode today).
#
#   [tool.os.<name>]       # OPTIONAL table of OS-level dependencies (docker,
#                          # pkg-config, …) that rake cannot `cargo install`.
#                          # No update support. Tool names share one flat
#                          # reference namespace with [tool.cargo.*].
#     check   = [...]      # REQUIRED. Presence probe; zero exit = installed.
#     install = [...]      # OPTIONAL. Run when absent; if omitted, an absent
#                          # tool aborts the run with the requirement below.
#     hint    = "..."      # OPTIONAL. Shown when absent and no install is set.
#
#   [target.<name>]
#     depends_on = []      # default. Targets to run first, in order.
#     tools      = []      # default. Tool names (from [tool.*]) to ensure first.
#     platform   = []      # OPTIONAL, default: unset (every platform). OS and/or
#                          # family tokens (e.g. "linux", "macos", "unix"). When
#                          # set, the whole target (and any dep reachable only
#                          # through it) is silently pruned before graph building
#                          # on non-matching hosts. Commands in a platform-scoped
#                          # target must not declare their own platform — error.
#
#   [[target.<name>.command]]
#     name          = "..."   # REQUIRED. Label shown in --list and errors;
#                             # unique within the target.
#     cmd           = [...]   # Program + args, spawned directly — no shell.
#                             # Mutually exclusive with sh/fish/ps.
#     sh            = "..."   # A command line run through `sh -c`. Selected when
#                             # the detected shell is a POSIX shell.
#     fish          = "..."   # A command line run through `fish -c`. Selected
#                             # when the detected shell is fish.
#     ps            = "..."   # A command line run through PowerShell `-Command`
#                             # (pwsh, else powershell). Selected on PowerShell.
#                             #
#                             # Set exactly one *kind* of body: either `cmd`, or
#                             # one or more of sh/fish/ps. rake auto-detects the
#                             # current shell (via $SHELL) and runs the matching
#                             # variant; if it isn't defined, the run aborts.
#     skip_on_error = false   # default. When true, a non-zero exit is tolerated
#                             # and the target continues instead of aborting.
#     platform      = [...]   # OPTIONAL, default: unset (every platform). OS
#                             # and/or family tokens (e.g. "linux", "macos",
#                             # "windows", or the family "unix"); the command runs
#                             # only when the host's OS or family matches one,
#                             # else it is silently skipped (Skipped line).
#                             # Cannot be used inside a target that already
#                             # declares a top-level platform — that is a
#                             # syntax error (CommandPlatformInPlatformTarget).
#     arch          = [...]   # OPTIONAL, default: unset (every architecture).
#                             # Arch tokens (e.g. "x86_64", "aarch64"); combined
#                             # with `platform` as a logical AND.
# =============================================================================
# toolchain = "stable"

# ---------------------------------------------------------------------------
# lifecycle
# ---------------------------------------------------------------------------

[lifecycle]
address = ["127.0.0.1:9999"]

# ---------------------------------------------------------------------------
# tools
# ---------------------------------------------------------------------------

[tool.cargo.matrix]
crate = "cargo-matrix"
check = ["cargo", "matrix", "--version"]
install = ["cargo", "install", "cargo-matrix", "--force", "--locked"]
update = true                                                         # default: false
# semver_check = "crates-io"      # default (and only mode today)

[tool.cargo.nextest]
crate = "cargo-nextest"
check = ["cargo", "nextest", "--version"]
install = ["cargo", "install", "cargo-nextest", "--force", "--locked"]
update = true

[tool.cargo.llvm-cov]
crate = "cargo-llvm-cov"
check = ["cargo", "llvm-cov", "--version"]
install = ["cargo", "install", "cargo-llvm-cov", "--force", "--locked"]
update = true

# Example OS-level dependency
[tool.os.docker]
check = ["docker", "--version"]
hint = "install Docker: https://docs.docker.com/get-docker/"

[tool.fish.puc]
hint = "The 'puc' fish function is required to run this target"

# ---------------------------------------------------------------------------
# update
# ---------------------------------------------------------------------------

[target.puc.linux]
tools = ["puc"]
time_tracking = false

[[target.puc.linux.command]]
name = "puc"
fish = "puc"

[[target.puc.command]]
name = "pull"
cmd = ["git", "pull"]

[[target.puc.command]]
name = "puc clean"
cmd = ["cargo", "clean"]

# ---------------------------------------------------------------------------
# platform-specific target example
#
# [target.linux-only.linux] declares a linux-only variant with no base target.
# On macOS or Windows the target is simply absent from the resolved map.  Any
# other target that depends_on it would get TargetNotAvailableOnPlatform on a
# non-linux host — add a base [target.linux-only] if cross-platform use is needed.
# ---------------------------------------------------------------------------

[target.linux-only.linux]

[[target.linux-only.linux.command]]
name = "uname"
cmd  = ["uname", "-r"]

# ---------------------------------------------------------------------------
# fmt
# ---------------------------------------------------------------------------

[[target.fmt.command]]
name = "fmt"
cmd = ["cargo", "fmt"]

[[target.fmt.command]]
name = "fmt check"
cmd = ["cargo", "fmt", "--all", "--", "--check"]

# ---------------------------------------------------------------------------
# clippy
# ---------------------------------------------------------------------------

[target.clippy]
tools = ["matrix"]

[[target.clippy.command]]
name = "clippy"
cmd = ["cargo", "matrix", "clippy", "--all-targets", "--", "-Dwarnings"]

# ---------------------------------------------------------------------------
# build
# ---------------------------------------------------------------------------

[target.build]
tools = ["matrix"]
[[target.build.command]]
name = "build"
cmd = ["cargo", "matrix", "build"]

# ---------------------------------------------------------------------------
# test
# ---------------------------------------------------------------------------

[target.test]
tools = ["matrix", "nextest"]
depends_on = ["build"]
[[target.test.command]]
name = "test"
cmd = ["cargo", "matrix", "nextest", "run"]

# ---------------------------------------------------------------------------
# docs
# ---------------------------------------------------------------------------

[[target.test.command]]
name = "doc test"
cmd = ["cargo", "matrix", "test", "--doc", "-p", "librake"]

# ---------------------------------------------------------------------------
# coverage
# ---------------------------------------------------------------------------

[target.coverage]
tools = ["llvm-cov", "matrix", "nextest"]
depends_on = ["test"]
[[target.coverage.command]]
name = "coverage"
cmd = [
    "cargo",
    "matrix",
    "-F",
    "unstable",
    "llvm-cov",
    "nextest",
    "--no-report",
]

[[target.coverage.command]]
name = "lcov.info"
cmd = ["cargo", "llvm-cov", "report", "--lcov", "--output-path", "lcov.info"]

[[target.coverage.command]]
name = "html"
cmd = ["cargo", "llvm-cov", "report", "--html"]

# ---------------------------------------------------------------------------
# install
# ---------------------------------------------------------------------------

[target.install]
depends_on = ["build"]
[[target.install.command]]
name = "install"
cmd = ["cargo", "install", "--path", "cargo-rake", "--force", "--locked"]

# ---------------------------------------------------------------------------
# musl
# ---------------------------------------------------------------------------

[target.musl]
tools = ["docker"]
[[target.musl.command]]
name = "musl"
# A static musl build via a Linux container — only meaningful on a Unix host, so
# gate it with `platform`. On any other platform rake prints a `Skipped` line and
# moves on. Defines both a fish and a POSIX variant; rake runs whichever matches
# the current shell. Note the differing command-substitution syntax: fish `(pwd)`
# vs POSIX `$(pwd)`, and fish `~` vs POSIX `$HOME`.
platform = ["linux", "macos"]
fish = "docker run -v cargo-cache:/root/.cargo/registry -v (pwd):/home/rust/src -v ~/.gitconfig:/root/.gitconfig:ro --rm -t blackdex/rust-musl:x86_64-musl-nightly cargo build --release"
sh = "docker run -v cargo-cache:/root/.cargo/registry -v \"$(pwd)\":/home/rust/src -v \"$HOME/.gitconfig\":/root/.gitconfig:ro --rm -t blackdex/rust-musl:x86_64-musl-nightly cargo build --release"

[[target.musl.command]]
name = "perm"
# `$USER` expands the same in fish and POSIX, but a variant must exist for the
# detected shell, so define both.
fish = "sudo chown -R $USER:$USER target/"
sh = "sudo chown -R $USER:$USER target/"

# ---------------------------------------------------------------------------
# clean
# ---------------------------------------------------------------------------

[[target.clean.command]]
name = "clean"
cmd = ["cargo", "clean"]

[[target.clean.command]]
name = "rm lcov.info"
fish = "rm -f lcov.info"
sh = "rm -f lcov.info"
ps = "Remove-Item -Force lcov.info -ErrorAction Ignore"

# ---------------------------------------------------------------------------
# aggregates
# ---------------------------------------------------------------------------

[target.most]
depends_on = ["fmt", "clippy", "build", "test", "coverage", "musl"]

[target.most.windows]
depends_on = ["fmt", "clippy", "build", "test", "coverage"]

[target.most.macos]
depends_on = ["fmt", "clippy", "build", "test", "coverage"]

[target.daily.windows]
depends_on = ["all", "^musl", "^install"]

[target.daily.macos]
depends_on = ["all", "^musl"]

[target.daily]
depends_on = ["all", "^install"]

[target.all]
depends_on = [
    "puc",
    "fmt",
    "clippy",
    "build",
    "test",
    "coverage",
    "install",
    "musl",
    "clean",
]

[target.default]
depends_on = ["most"]
